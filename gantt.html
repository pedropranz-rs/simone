<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>550 GB — Construction Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --n-50:  #fafafb;
  --n-100: #f4f4f5;
  --n-200: #e4e5e8;
  --n-300: #c9cad0;
  --n-400: #9b9da8;
  --n-600: #63656e;
  --n-700: #43454c;
  --n-800: #313238;
  --n-black: #1a1b1f;
  --s-50:  #faf8f5;
  --s-100: #f3eee7;
  --s-200: #ebe2d6;
  --s-300: #e1d3c1;
  --s-800: #5b4f42;
  --accent: #ffff90;

  --left-w: 360px;
  --day-px: 5;
  --row-min: 36px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--n-800);
  background: var(--n-50);
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ── */
.topbar {
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--n-200);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 200;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--n-800);
}
.logo span { color: var(--s-800); }
.divider-v { width: 1px; height: 20px; background: var(--n-200); }
.breadcrumb {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: var(--n-600);
}
.breadcrumb strong { color: var(--n-800); font-weight: 500; }
.breadcrumb svg { width: 14px; height: 14px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn {
  height: 30px; padding: 0 12px;
  border-radius: 6px;
  border: 1px solid var(--n-200);
  background: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--n-700);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.btn:hover { background: var(--n-50); border-color: var(--n-300); }
.btn-primary { background: var(--n-800); border-color: var(--n-800); color: var(--white); }
.btn-primary:hover { background: var(--n-black); }
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); border: 1px solid #e6e67c;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #5c5c30;
}

/* ── APP LAYOUT ── */
.app-layout { display: flex; flex: 1; overflow: hidden; }

/* ── MAIN PANEL ── */
.main-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--white);
}

/* ── TOOLBAR ── */
.toolbar {
  height: 52px;
  border-bottom: 1px solid var(--n-200);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  flex-shrink: 0;
  background: var(--white);
  z-index: 50;
}
.toolbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 500;
  color: var(--n-800); letter-spacing: .02em;
}
.toolbar-range { font-size: 11px; color: var(--n-400); font-weight: 400; margin-left: 6px; }
.view-tabs {
  display: flex; background: var(--n-100);
  border-radius: 8px; padding: 3px; gap: 2px; margin-left: 12px;
}
.vtab {
  padding: 5px 14px; border-radius: 6px;
  font-size: 12px; font-weight: 500; color: var(--n-600);
  cursor: pointer; border: none; background: transparent;
  font-family: 'Jost', sans-serif; white-space: nowrap;
  transition: all .15s;
}
.vtab.active { background: var(--white); color: var(--n-800); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* status legend */
.legend { display: flex; align-items: center; gap: 10px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--n-600); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

.today-btn {
  height: 28px; padding: 0 10px;
  border-radius: 5px; border: 1px solid var(--n-200);
  background: var(--white);
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500; color: var(--n-600);
  cursor: pointer; display: flex; align-items: center; gap: 5px;
}
.today-btn:hover { background: var(--n-50); }

/* ── GANTT OUTER ── */
#task-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.gantt-scroll {
  flex: 1; overflow: auto;
  position: relative;
}
.gantt-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.gantt-scroll::-webkit-scrollbar-track { background: var(--n-100); }
.gantt-scroll::-webkit-scrollbar-thumb { background: var(--n-300); border-radius: 3px; }

/* ── GANTT TABLE ── */
.gantt-table {
  display: flex; flex-direction: column;
  min-width: calc(var(--left-w) + 1600px);
}

/* ── HEADER ROW ── */
.gantt-thead {
  position: sticky; top: 0; z-index: 40;
  display: flex;
  background: var(--n-50);
  border-bottom: 1px solid var(--n-200);
}
.thead-left {
  width: var(--left-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 41;
  background: var(--n-50);
  border-right: 1px solid var(--n-200);
  display: flex; align-items: flex-end;
  padding: 0 0 0 16px;
}
.thead-cols {
  display: grid;
  grid-template-columns: 1fr 68px 58px 58px;
  width: 100%;
  padding-bottom: 10px;
}
.thead-col {
  font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--n-400);
  padding-right: 8px;
}
.thead-timeline {
  flex: 1;
  display: flex; flex-direction: column;
}
.months-row {
  height: 38px; display: flex;
  border-bottom: 1px solid var(--n-200);
}
.month-cell {
  flex-shrink: 0; height: 100%;
  border-right: 1px solid var(--n-200);
  display: flex; align-items: center; padding: 0 10px;
  font-size: 11px; font-weight: 600;
  letter-spacing: .06em; color: var(--n-600);
  text-transform: uppercase;
}
.weeks-row { height: 38px; display: flex; }
.week-cell {
  flex-shrink: 0; height: 100%;
  border-right: 1px solid var(--n-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--n-400);
}

/* ── DATA ROW ── */
.g-row {
  display: flex;
  border-bottom: 1px solid var(--n-100);
  min-height: var(--row-min);
}
.g-row:hover .row-left { background: var(--n-50); }
.g-row.is-phase:hover .row-left { background: var(--s-100); }

/* LEFT STICKY CELL */
.row-left {
  width: var(--left-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 10;
  background: var(--white);
  border-right: 1px solid var(--n-200);
  display: grid;
  grid-template-columns: 1fr 68px 58px 58px;
  align-items: center;
  padding: 6px 0 6px 0;
  transition: background .1s;
}
.g-row.is-phase .row-left { background: var(--s-50); }

/* phase accent stripe */
.phase-stripe {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 2px 2px 0;
}

/* name cell */
.name-cell {
  display: flex; align-items: flex-start;
  padding-right: 8px; position: relative;
  min-height: 24px;
}
.collapse-btn {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1px solid var(--n-200); background: var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; margin-right: 5px; margin-top: 1px;
  transition: all .15s;
}
.collapse-btn:hover { border-color: var(--n-300); background: var(--n-50); }
.collapse-btn svg { width: 10px; height: 10px; color: var(--n-600); transition: transform .2s; }
.collapse-btn.is-closed svg { transform: rotate(-90deg); }
.name-spacer { width: 23px; flex-shrink: 0; }

/* status dot */
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; margin-right: 6px; margin-top: 5px;
}
.status-dot.complete    { background: #22c55e; }
.status-dot.in-progress { background: #f59e0b; }
.status-dot.not-started { background: var(--n-300); }

.name-text {
  font-size: 12.5px; color: var(--n-700);
  line-height: 1.4;
  word-break: break-word;
}
.is-phase .name-text { font-weight: 600; color: var(--n-800); font-size: 13px; }
.is-milestone .name-text { font-style: italic; color: var(--n-600); font-size: 12px; }

/* meta cells */
.meta-cell {
  font-size: 11px; color: var(--n-400);
  padding-right: 8px; align-self: center;
  line-height: 1.3;
}
.date-cell {
  font-size: 11px; color: var(--n-500, #8a8c96);
  font-variant-numeric: tabular-nums;
  align-self: center;
  padding-right: 6px;
}
.no-date-cell {
  font-size: 10px; color: var(--n-300);
  align-self: center; font-style: italic;
  padding-right: 6px;
}

/* ── RIGHT GANTT AREA ── */
.row-right {
  flex: 1; position: relative;
  min-height: var(--row-min);
}

/* ── GANTT BARS ── */
.g-bar {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  border-radius: 4px;
  cursor: pointer;
  transition: filter .15s;
  display: flex; align-items: center;
  overflow: hidden; padding: 0 6px;
}
.g-bar:hover { filter: brightness(1.06); }
.g-bar.bar-phase   { height: 22px; border-radius: 5px; }
.g-bar.bar-deliv   { height: 14px; border-radius: 3px; }
.g-bar.bar-mile    { width: 0!important; height: 0; background: none!important; border: none!important; overflow: visible; padding: 0; }

/* complete bars get a subtle opacity */
.g-bar.status-complete { opacity: 0.75; }
/* in-progress bars get a diagonal stripe overlay */
.g-bar.status-in-progress::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 4px,
    rgba(255,255,255,.15) 4px,
    rgba(255,255,255,.15) 8px
  );
}

.bar-label {
  font-size: 10px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  position: relative; z-index: 1;
}

/* milestone diamond */
.mile-diamond {
  position: absolute; left: -6px; top: 50%; margin-top: -6px;
  width: 12px; height: 12px;
  transform: rotate(45deg); border-radius: 2px;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}

/* grid lines */
.grid-line {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: var(--n-200); pointer-events: none; z-index: 0;
}
.today-line {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: #e05a2b; opacity: .8; pointer-events: none; z-index: 5;
}

/* ── COLUMN RESIZER ── */
#colResizer {
  position: absolute;
  top: 0; bottom: 0;
  width: 16px;
  left: calc(var(--left-w) - 8px);
  cursor: col-resize;
  z-index: 300;
  background: transparent;
  display: flex;
  align-items: stretch;
  justify-content: center;
}
#colResizer::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 7px;
  width: 2px;
  background: var(--n-200);
  transition: background .15s;
}
#colResizer::after {
  content: '⋮⋮';
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: -2px;
  color: var(--n-400);
  background: var(--white);
  border: 1px solid var(--n-200);
  border-radius: 3px;
  padding: 2px 3px;
  line-height: 1;
  pointer-events: none;
}
#colResizer:hover::before { background: var(--s-800); }
#colResizer:hover::after  { color: var(--s-800); border-color: var(--s-300); }
#colResizer.dragging::before { background: var(--s-800); }
body.col-resizing { cursor: col-resize !important; user-select: none !important; }

/* ── TOOLTIP ── */
.gantt-tip {
  position: fixed; background: var(--n-800); color: var(--white);
  padding: 8px 12px; border-radius: 6px;
  font-size: 11.5px; line-height: 1.5;
  pointer-events: none; z-index: 9999;
  max-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,.2);
  display: none;
}
.gantt-tip.show { display: block; }
.tip-title { font-weight: 600; margin-bottom: 2px; }
.tip-meta  { color: var(--n-300); font-size: 11px; }
.tip-status { display: inline-flex; align-items: center; gap: 4px; }
.tip-status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* ── SPECBOOK PLACEHOLDER ── */
#specbook-view {
  display: none; flex: 1;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; color: var(--n-400);
}
#specbook-view h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400; color: var(--n-600);
}
#specbook-view p {
  font-size: 13px; max-width: 340px;
  text-align: center; line-height: 1.6;
}
#specbook-view svg { width: 48px; height: 48px; color: var(--n-300); }
</style>
</head>

<script>
// ── TIMELINE CONFIG ───────────────────────────────────────────────
const TL_START = '2026-06-14';
const TL_END   = '2026-12-13';
const DAY_PX   = 5;

function toUTC(s) {
  const [y,m,d] = s.split('-').map(Number);
  return Date.UTC(y, m-1, d);
}
function dayOffset(s) {
  return Math.round((toUTC(s) - toUTC(TL_START)) / 86400000);
}
function px(s) { return dayOffset(s) * DAY_PX; }
function daysPx(n) { return n * DAY_PX; }
function fmtDate(s) {
  const [,m,d] = s.split('-').map(Number);
  return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}`;
}

// ── PHASE PALETTE ─────────────────────────────────────────────────
const PAL = {
  shop:   { bar:'#8a8c96', mid:'#aaadb8', light:'#e8e9ee', text:'rgba(255,255,255,.9)',  darkText:'#5a5c6e' },
  found:  { bar:'#c4895a', mid:'#dba978', light:'#f5e8dc', text:'rgba(255,255,255,.95)', darkText:'#7a4e28' },
  mep:    { bar:'#5a87b8', mid:'#7aaad4', light:'#dce8f5', text:'rgba(255,255,255,.95)', darkText:'#2a5080' },
  struct: { bar:'#7a9b7a', mid:'#98ba98', light:'#dfeadf', text:'rgba(255,255,255,.95)', darkText:'#3a6e3a' },
  ext:    { bar:'#9b8855', mid:'#c0a870', light:'#f0e8d5', text:'rgba(255,255,255,.95)', darkText:'#6a5a20' },
  land:   { bar:'#6b9b6b', mid:'#8dc08d', light:'#daeada', text:'rgba(255,255,255,.95)', darkText:'#3a6e3a' },
  kit:    { bar:'#8b7ab8', mid:'#aaa0d8', light:'#eae5f5', text:'rgba(255,255,255,.95)', darkText:'#5a4580' },
  fin:    { bar:'#b8705a', mid:'#d49080', light:'#f5e0da', text:'rgba(255,255,255,.95)', darkText:'#802a18' },
};

function barColor(t) {
  const p = PAL[t.phase] || PAL.shop;
  if (t.type === 'phase') return p.bar;
  return p.light;
}
function barTextColor(t) {
  const p = PAL[t.phase] || PAL.shop;
  return t.type === 'phase' ? p.text : p.darkText;
}

// ── STATUS COLORS ─────────────────────────────────────────────────
const STATUS_COLOR = {
  'complete':    '#22c55e',
  'in-progress': '#f59e0b',
  'not-started': '#c9cad0',
};
const STATUS_LABEL = {
  'complete':    'Complete',
  'in-progress': 'In Progress',
  'not-started': 'Not Started',
};

// ── TASK DATA ─────────────────────────────────────────────────────
const TASKS = [
  {
    id:'shop', type:'phase', phase:'shop', status:'not-started',
    name:'Shop Drawings',
    dur:'TBD', start:'2026-06-14', end:'2026-12-13',
    ch:[
      { id:'shop1', type:'deliverable', phase:'shop', status:'not-started', name:'Louver Shop Drawing',   dur:'—', noDate:true, start:'2026-06-14', end:'2026-06-14' },
      { id:'shop2', type:'deliverable', phase:'shop', status:'not-started', name:'Shoring Shop Drawing',  dur:'—', noDate:true, start:'2026-06-14', end:'2026-06-14' },
      { id:'shop3', type:'deliverable', phase:'shop', status:'not-started', name:'Cladding Shop Drawing', dur:'—', noDate:true, start:'2026-06-14', end:'2026-06-14' },
      { id:'shop4', type:'deliverable', phase:'shop', status:'not-started', name:'Kitchen Design',        dur:'—', noDate:true, start:'2026-06-14', end:'2026-06-14' },
    ]
  },
  {
    id:'found', type:'phase', phase:'found', status:'in-progress',
    name:'Foundation & Slab',
    dur:'25d', start:'2026-06-15', end:'2026-07-20',
    ch:[

// ── COLLAPSE STATE ────────────────────────────────────────────────
const collapsed = new Set();

// ── FLATTEN ───────────────────────────────────────────────────────
function flatten(items, depth=0, hidden=false) {
  let out = [];
  for (const item of items) {
    out.push({ ...item, depth, hidden });
    if (item.ch && item.ch.length) {
      out = out.concat(flatten(item.ch, depth+1, hidden || collapsed.has(item.id)));
    }
  }
  return out;
}

// ── TIMELINE HEADER ───────────────────────────────────────────────
function buildHeader() {
  const months = [];
  let [cy, cm] = TL_START.split('-').map(Number);
  const [ey, em] = TL_END.split('-').map(Number);
  while (cy < ey || (cy===ey && cm<=em)) {
    months.push({ y:cy, m:cm });
    cm++; if(cm>12){cm=1;cy++;}
  }
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mr = document.createElement('div'); mr.className = 'months-row';
  for (let i=0; i<months.length; i++) {
    const { y, m } = months[i];
    const s = `${y}-${String(m).padStart(2,'0')}-01`;
    let e;
    if(i<months.length-1){const nx=months[i+1];e=`${nx.y}-${String(nx.m).padStart(2,'0')}-01`;}
    else{e=TL_END;}
    const w = Math.max(0, px(e) - Math.max(0, px(s)));
    if(w<=0) continue;
    const c = document.createElement('div'); c.className='month-cell';
    c.style.width = w+'px';
    c.textContent = MN[m-1]+' '+String(y).slice(2);
    mr.appendChild(c);
  }
  const wr = document.createElement('div'); wr.className='weeks-row';
  let wms = toUTC(TL_START);
  const tlems = toUTC(TL_END);
  const sd = new Date(wms); const dow = sd.getUTCDay();
  if(dow!==0) wms -= dow*86400000;
  while(wms<=tlems){
    const d=new Date(wms); const ds=d.getUTCDate();
    const c=document.createElement('div'); c.className='week-cell';
    c.style.width = daysPx(7)+'px'; c.textContent=ds;
    wr.appendChild(c); wms+=7*86400000;
  }
  const tl = document.createElement('div'); tl.className='thead-timeline';
  tl.appendChild(mr); tl.appendChild(wr);
  return tl;
}

// ── MONTH GRID POSITIONS ──────────────────────────────────────────
function monthPositions() {
  const pos = [];
  let [cy,cm] = TL_START.split('-').map(Number);
  cm++; if(cm>12){cm=1;cy++;}
  while(toUTC(`${cy}-${String(cm).padStart(2,'0')}-01`) <= toUTC(TL_END)){
    pos.push(px(`${cy}-${String(cm).padStart(2,'0')}-01`));
    cm++; if(cm>12){cm=1;cy++;}
  }
  return pos;
}

const MONTH_PX = monthPositions();
const TODAY_PX = px('2026-06-23');

// ── RENDER ROW ────────────────────────────────────────────────────
function renderRow(t) {
  const row = document.createElement('div');
  row.className = 'g-row';
  if(t.type==='phase') row.classList.add('is-phase');
  if(t.type==='milestone') row.classList.add('is-milestone');

  // ── LEFT ──────────────────────────────────────────────────────
  const left = document.createElement('div'); left.className='row-left';
  left.style.position = 'relative';

  if(t.type==='phase'){
    const stripe = document.createElement('div'); stripe.className='phase-stripe';
    stripe.style.background = (PAL[t.phase]||PAL.shop).bar;
    left.appendChild(stripe);
  }

  // name cell
  const nameCell = document.createElement('div'); nameCell.className='name-cell';
  const indentPx = 6 + t.depth * 16;
  nameCell.style.paddingLeft = indentPx+'px';

  const hasChildren = t.ch && t.ch.length > 0;
  if(hasChildren){
    const btn = document.createElement('button'); btn.className='collapse-btn';
    if(collapsed.has(t.id)) btn.classList.add('is-closed');
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
    btn.onclick = e => { e.stopPropagation(); collapsed.has(t.id)?collapsed.delete(t.id):collapsed.add(t.id); render(); };
    nameCell.appendChild(btn);
  } else {
    const sp = document.createElement('div'); sp.className='name-spacer'; nameCell.appendChild(sp);
  }

  // status dot
  const dot = document.createElement('div');
  dot.className = 'status-dot ' + (t.status||'not-started');
  nameCell.appendChild(dot);

  const nt = document.createElement('span'); nt.className='name-text'; nt.textContent=t.name;
  nameCell.appendChild(nt);

  // dur / start / end
  const durCell   = document.createElement('div'); durCell.className='meta-cell';   durCell.textContent=t.dur||'—';
  const startCell = document.createElement('div');
  const endCell   = document.createElement('div');

  if(t.noDate){
    startCell.className='no-date-cell'; startCell.textContent='TBD';
    endCell.className='no-date-cell';   endCell.textContent='TBD';
  } else {
    startCell.className='date-cell'; startCell.textContent=fmtDate(t.start);
    endCell.className='date-cell';   endCell.textContent=fmtDate(t.end);
  }

  left.appendChild(nameCell);
  left.appendChild(durCell);
  left.appendChild(startCell);
  left.appendChild(endCell);

  // ── RIGHT ─────────────────────────────────────────────────────
  const right = document.createElement('div'); right.className='row-right';

  MONTH_PX.forEach(mpx => {
    const gl=document.createElement('div'); gl.className='grid-line'; gl.style.left=mpx+'px'; right.appendChild(gl);
  });

  const tl=document.createElement('div'); tl.className='today-line'; tl.style.left=TODAY_PX+'px'; right.appendChild(tl);

  if(!t.noDate){
    const startPx = px(t.start);
    const endPx   = px(t.end);
    const barW    = Math.max(endPx - startPx, t.type==='milestone'?0:DAY_PX);

    if(t.type==='milestone'){
      const bar = document.createElement('div'); bar.className='g-bar bar-mile';
      bar.style.left = startPx+'px';
      const dia = document.createElement('div'); dia.className='mile-diamond';
      dia.style.background = (PAL[t.phase]||PAL.shop).bar;
      bar.appendChild(dia);
      bar.addEventListener('mouseenter', e=>showTip(e,t));
      bar.addEventListener('mousemove', moveTip);
      bar.addEventListener('mouseleave', hideTip);
      right.appendChild(bar);
    } else {
      const pal = PAL[t.phase] || PAL.shop;
      const bar = document.createElement('div');
      bar.className = 'g-bar ' + (t.type==='phase' ? 'bar-phase' : 'bar-deliv') + ' status-' + (t.status||'not-started');
      bar.style.cssText += `left:${startPx}px;width:${barW}px;background:${barColor(t)};`;
      if(t.type==='deliverable'){
        bar.style.border = `1px solid ${pal.mid}`;
      }
      if(barW > 40){
        const lbl=document.createElement('span'); lbl.className='bar-label';
        lbl.style.color=barTextColor(t); lbl.textContent=t.name; bar.appendChild(lbl);
      }
      bar.addEventListener('mouseenter', e=>showTip(e,t));
      bar.addEventListener('mousemove', moveTip);
      bar.addEventListener('mouseleave', hideTip);
      right.appendChild(bar);
    }
  }

  row.appendChild(left);
  row.appendChild(right);
  return row;
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const table = document.getElementById('ganttTable');
  table.innerHTML = '';

  const thead = document.createElement('div'); thead.className='gantt-thead';
  const tl = document.createElement('div'); tl.className='thead-left';
  const tc = document.createElement('div'); tc.className='thead-cols';
  ['Name','Duration','Start','Finish'].forEach(h=>{
    const el=document.createElement('div'); el.className='thead-col'; el.textContent=h; tc.appendChild(el);
  });
  tl.appendChild(tc);
  thead.appendChild(tl);
  thead.appendChild(buildHeader());
  table.appendChild(thead);

  const rows = flatten(TASKS);
  rows.forEach(t => { if(!t.hidden) table.appendChild(renderRow(t)); });
}

// ── TOOLTIP ───────────────────────────────────────────────────────
const tip = document.getElementById('tip');
function showTip(e,t){
  const sc = STATUS_COLOR[t.status]||'#ccc';
  const sl = STATUS_LABEL[t.status]||'';
  const dateInfo = t.noDate ? 'Dates TBD' : `${t.start} → ${t.end}`;
  tip.innerHTML=`<div class="tip-title">${t.name}</div>
    <div class="tip-meta"><span class="tip-status"><span class="tip-status-dot" style="background:${sc}"></span>${sl}</span></div>
    <div class="tip-meta">${dateInfo}${t.dur && t.dur!=='—' ? ' &nbsp;·&nbsp; '+t.dur : ''}</div>`;
  tip.classList.add('show'); moveTip(e);
}
function moveTip(e){ tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px'; }
function hideTip(){ tip.classList.remove('show'); }

// ── SCROLL TO TODAY ───────────────────────────────────────────────
function scrollToToday(){
  document.getElementById('ganttScroll').scrollLeft = Math.max(0, TODAY_PX - 300);
}

// ── EXPAND / COLLAPSE ALL ─────────────────────────────────────────
function expandAll(){ collapsed.clear(); render(); }
function collapseAll(){
  function mark(items){ items.forEach(t=>{ if(t.ch&&t.ch.length){ collapsed.add(t.id); mark(t.ch); } }); }
  mark(TASKS); render();
}

// ── VIEW SWITCH ───────────────────────────────────────────────────
function switchView(v, btn){
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('task-view').style.display    = v==='task'     ? '' : 'none';
  document.getElementById('specbook-view').style.display = v==='specbook' ? 'flex' : 'none';
}

// ── COLUMN RESIZER ────────────────────────────────────────────────
function initResize() {
  const handle = document.getElementById('colResizer');
  if(!handle) return;
  handle.addEventListener('mousedown', function(e){
    e.preventDefault();
    const startX = e.clientX;
    const startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w')) || 360;
    handle.classList.add('dragging');
    document.body.classList.add('col-resizing');
    function onMove(e){
      const newW = Math.max(200, Math.min(800, startW + (e.clientX - startX)));
      document.documentElement.style.setProperty('--left-w', newW+'px');
    }
    function onUp(){
      handle.classList.remove('dragging');
      document.body.classList.remove('col-resizing');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// ── INIT ──────────────────────────────────────────────────────────
render();
scrollToToday();
initResize();
