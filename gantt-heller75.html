<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSI — Projects Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --n-50:  #fafafb;
  --n-100: #f4f4f5;
  --n-200: #e4e5e8;
  --n-300: #c9cad0;
  --n-400: #9b9da8;
  --n-600: #63656e;
  --n-700: #43454c;
  --n-800: #313238;
  --n-black: #1a1b1f;
  --s-50:  #faf8f5;
  --s-100: #f3eee7;
  --s-200: #ebe2d6;
  --s-300: #e1d3c1;
  --s-800: #5b4f42;
  --accent: #ffff90;
  --left-w: 420px;
  --row-min: 36px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--n-800);
  background: var(--n-50);
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ── */
.topbar {
  height: 48px; background: var(--white);
  border-bottom: 1px solid var(--n-200);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  flex-shrink: 0; z-index: 200;
}
.nav-hamburger {
  width: 32px; height: 32px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; flex-shrink: 0;
}
.nav-hamburger span {
  display: block; width: 18px; height: 1.5px; background: var(--n-700); border-radius: 1px;
}
.nav-brand {
  font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400;
  color: var(--n-800); letter-spacing: 0.01em;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); border: 1px solid #e6e67c;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #5c5c30;
}
.nav-chevron { color: var(--n-400); display: flex; align-items: center; }
.nav-app-icon {
  width: 28px; height: 28px; background: var(--n-800); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.btn {
  height: 30px; padding: 0 12px; border-radius: 6px;
  border: 1px solid var(--n-200); background: var(--white);
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--n-700); cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.btn:hover { background: var(--n-50); border-color: var(--n-300); }

/* ── LAYOUT ── */
.app-layout { display: flex; flex: 1; overflow: hidden; }
.main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--white); }

/* ── TOOLBAR ── */
.toolbar {
  height: 52px; border-bottom: 1px solid var(--n-200);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  flex-shrink: 0; background: var(--white); z-index: 50;
}
.toolbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 500; color: var(--n-800); letter-spacing: .02em;
}
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* ── FILTER TOOLBAR ── */
.filter-bar {
  height: 40px; border-bottom: 1px solid var(--n-200);
  display: flex; align-items: center; padding: 0 20px; gap: 4px;
  flex-shrink: 0; background: var(--n-50); z-index: 49;
}
.filter-label { font-size: 11px; color: var(--n-400); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; margin-right: 8px; }
.zoom-btn {
  height: 26px; padding: 0 12px; border-radius: 5px;
  border: 1px solid transparent; background: transparent;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--n-600); cursor: pointer; transition: all .15s;
}
.zoom-btn:hover { background: var(--white); border-color: var(--n-200); color: var(--n-800); }
.zoom-btn.active {
  background: var(--white); border-color: var(--n-300);
  color: var(--n-800); box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.today-btn {
  height: 28px; padding: 0 10px; border-radius: 5px; border: 1px solid var(--n-200);
  background: var(--white); font-family: 'Jost', sans-serif; font-size: 11px;
  font-weight: 500; color: var(--n-600); cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.today-btn:hover { background: var(--n-50); }

/* ── GANTT ── */
#task-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.gantt-scroll { flex: 1; overflow: auto; position: relative; }
.gantt-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.gantt-scroll::-webkit-scrollbar-track { background: var(--n-100); }
.gantt-scroll::-webkit-scrollbar-thumb { background: var(--n-300); border-radius: 3px; }
.gantt-table { display: flex; flex-direction: column; min-width: calc(var(--left-w) + 2400px); }

/* ── HEADER ── */
.gantt-thead {
  position: sticky; top: 0; z-index: 40;
  display: flex; background: var(--n-50); border-bottom: 1px solid var(--n-200);
}
.thead-left {
  width: var(--left-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 41;
  background: var(--n-50); border-right: 1px solid var(--n-200);
  display: flex; align-items: flex-end; padding: 0 0 0 16px;
}
.thead-cols {
  display: grid;
  grid-template-columns: 1fr 72px 54px 54px;
  width: 100%; padding-bottom: 10px;
}
.thead-col {
  font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; color: var(--n-400); padding-right: 8px;
}
.thead-timeline { flex: 1; display: flex; flex-direction: column; }
.months-row { height: 38px; display: flex; border-bottom: 1px solid var(--n-200); }
.month-cell {
  flex-shrink: 0; height: 100%; border-right: 1px solid var(--n-200);
  display: flex; align-items: center; padding: 0 10px;
  font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--n-600); text-transform: uppercase;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.weeks-row { height: 38px; display: flex; }
.week-cell {
  flex-shrink: 0; height: 100%; border-right: 1px solid var(--n-100);
  display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--n-400);
  overflow: hidden; white-space: nowrap;
}

/* ── ROWS ── */
.g-row { display: flex; border-bottom: 1px solid var(--n-100); min-height: var(--row-min); }
.g-row:hover .row-left { background: var(--n-50); }
.g-row.is-phase:hover .row-left { background: var(--s-100); }
.g-row.is-project .row-left { background: #f5f0ec; }
.g-row.is-project:hover .row-left { background: #ede5dc; }

/* LEFT STICKY */
.row-left {
  width: var(--left-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 10;
  background: var(--white); border-right: 1px solid var(--n-200);
  display: grid; grid-template-columns: 1fr 72px 54px 54px;
  align-items: center; padding: 6px 0; transition: background .1s;
}
.g-row.is-phase .row-left { background: var(--s-50); }

.phase-stripe {
  position: absolute; left: 0; top: 0; bottom: 0; border-radius: 0 2px 2px 0;
}

/* name cell */
.name-cell {
  display: flex; align-items: flex-start; padding-right: 8px; min-height: 24px;
}
.collapse-btn {
  width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--n-200);
  background: var(--white); display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; margin-right: 5px; margin-top: 1px; transition: all .15s;
}
.collapse-btn:hover { border-color: var(--n-300); background: var(--n-50); }
.collapse-btn svg { width: 10px; height: 10px; color: var(--n-600); transition: transform .2s; }
.collapse-btn.is-closed svg { transform: rotate(-90deg); }
.name-spacer { width: 23px; flex-shrink: 0; }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; margin-right: 6px; margin-top: 5px;
}
.status-dot.complete    { background: #22c55e; }
.status-dot.in-progress { background: #f59e0b; }
.status-dot.not-started { background: var(--n-300); }

.name-text { font-size: 12.5px; color: var(--n-700); line-height: 1.4; word-break: break-word; }
.is-phase   .name-text { font-weight: 600; color: var(--n-800); font-size: 13px; }
.is-project .name-text { font-weight: 600; color: var(--n-black); font-size: 13.5px; white-space: nowrap; }
.is-item    .name-text { font-size: 11.5px; color: var(--n-600); }
.g-row.is-item .row-left { background: var(--white); }
.g-row.is-item { border-bottom-color: var(--n-100); min-height: 28px; }
.g-row.is-item:hover .row-left { background: var(--n-50); }

.project-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .04em; color: var(--n-400);
  margin-left: 7px; margin-top: 4px; white-space: nowrap;
}

.meta-cell { font-size: 11px; color: var(--n-400); padding-right: 8px; align-self: center; line-height: 1.3; }
.date-cell {
  font-size: 11px; color: var(--n-500,#8a8c96);
  font-variant-numeric: tabular-nums; align-self: center; padding-right: 6px;
}
.no-date-cell { font-size: 10px; color: var(--n-300); align-self: center; font-style: italic; padding-right: 6px; }

/* ── RIGHT AREA ── */
.row-right { flex: 1; position: relative; min-height: var(--row-min); }

/* ── BARS ── */
.g-bar {
  position: absolute; top: 50%; transform: translateY(-50%);
  border-radius: 4px; cursor: pointer; transition: filter .15s;
  display: flex; align-items: center; overflow: hidden; padding: 0 6px;
}
.g-bar:hover { filter: brightness(1.07); }
.g-bar.bar-project { height: 26px; border-radius: 6px; }
.g-bar.bar-phase   { height: 20px; border-radius: 4px; }
.g-bar.bar-deliv   { height: 13px; border-radius: 3px; }
.g-bar.bar-item    { height: 8px;  border-radius: 2px; }

.g-bar.status-complete { opacity: 0.78; }
.g-bar.status-in-progress::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(255,255,255,.15) 4px, rgba(255,255,255,.15) 8px);
}

.bar-label {
  font-size: 10px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 1;
}

/* ── FILTER DROPDOWN ── */
.filter-btn {
  height: 26px; padding: 0 10px; border-radius: 5px;
  border: 1px solid var(--n-200); background: var(--white);
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--n-700); cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all .15s; margin-left: auto;
}
.filter-btn:hover { border-color: var(--n-300); background: var(--n-50); }
.filter-btn.has-filter { border-color: var(--s-800); color: var(--s-800); }
.filter-btn svg { width: 11px; height: 11px; }

.filter-popover {
  position: fixed; background: var(--white); border: 1px solid var(--n-200);
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.12);
  z-index: 500; min-width: 200px; padding: 8px 0; display: none;
}
.filter-popover.open { display: block; }
.filter-pop-title {
  font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--n-400); padding: 6px 14px 4px;
}
.filter-pop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; cursor: pointer; transition: background .1s;
}
.filter-pop-item:hover { background: var(--n-50); }
.filter-pop-check {
  width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--n-300);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .15s;
}
.filter-pop-check.checked { background: var(--n-800); border-color: var(--n-800); }
.filter-pop-check.checked::after {
  content: ''; display: block; width: 8px; height: 5px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px);
}
.filter-pop-label { font-size: 12.5px; color: var(--n-800); }
.filter-pop-divider { height: 1px; background: var(--n-100); margin: 6px 0; }
.filter-pop-clear {
  font-size: 11px; color: var(--n-400); padding: 5px 14px; cursor: pointer;
  transition: color .15s;
}
.filter-pop-clear:hover { color: var(--n-700); }

/* ── EXPORT ── */
.export-btn {
  height: 26px; padding: 0 10px; border-radius: 5px;
  border: 1px solid var(--n-200); background: var(--white);
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--n-700); cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all .15s;
}
.export-btn:hover { border-color: var(--n-300); background: var(--n-50); }
.export-btn svg { width: 11px; height: 11px; }
.export-popover {
  position: fixed; background: var(--white); border: 1px solid var(--n-200);
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.12);
  z-index: 500; min-width: 160px; padding: 4px 0; display: none;
}
.export-popover.open { display: block; }
.export-pop-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer; font-size: 12.5px; color: var(--n-800);
  transition: background .1s;
}
.export-pop-item:hover { background: var(--n-50); }
.export-pop-item svg { width: 13px; height: 13px; color: var(--n-500, #8a8c96); flex-shrink: 0; }

@media print {
  .topbar, .toolbar, .filter-bar, #colResizer, .gantt-tip { display: none !important; }
  html, body { overflow: visible !important; height: auto !important; }
  .app-layout, .main-panel, #task-view, .gantt-scroll { overflow: visible !important; height: auto !important; }
  .gantt-table { min-width: 0 !important; }
}

/* grid lines */
.grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--n-200); pointer-events: none; z-index: 0; }
.year-line  { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--n-300); pointer-events: none; z-index: 1; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #e05a2b; opacity: .7; pointer-events: none; z-index: 5; }

/* ── COLUMN RESIZER ── */
#colResizer {
  position: absolute; top: 0; bottom: 0; width: 16px;
  left: calc(var(--left-w) - 8px); cursor: col-resize; z-index: 300;
  background: transparent; display: flex; align-items: stretch; justify-content: center;
}
#colResizer::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 7px; width: 2px;
  background: var(--n-200); transition: background .15s;
}
#colResizer::after {
  content: '⋮⋮'; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: -2px; color: var(--n-400);
  background: var(--white); border: 1px solid var(--n-200); border-radius: 3px;
  padding: 2px 3px; line-height: 1; pointer-events: none;
}
#colResizer:hover::before { background: var(--s-800); }
#colResizer:hover::after  { color: var(--s-800); border-color: var(--s-300); }
#colResizer.dragging::before { background: var(--s-800); }
body.col-resizing { cursor: col-resize !important; user-select: none !important; }

/* ── TOOLTIP ── */
.gantt-tip {
  position: fixed; background: var(--n-800); color: var(--white);
  padding: 8px 12px; border-radius: 6px; font-size: 11.5px; line-height: 1.5;
  pointer-events: none; z-index: 9999; max-width: 280px; box-shadow: 0 4px 16px rgba(0,0,0,.2); display: none;
}
.gantt-tip.show { display: block; }
.tip-title { font-weight: 600; margin-bottom: 2px; }
.tip-meta  { color: var(--n-300); font-size: 11px; }
.tip-project { font-size: 10px; color: var(--n-400); margin-bottom: 3px; }
.tip-status { display: inline-flex; align-items: center; gap: 4px; }
.tip-status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<nav class="topbar">
  <div class="nav-hamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-brand">Rachel Simone Inc.</div>
  <div class="topbar-right">
    <div class="avatar">RS</div>
    <div class="nav-chevron">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="23" viewBox="0 0 28 23" fill="none">
      <path d="M28.0002 0H17.59C11.8733 0.017471 7.1972 4.7128 7.1972 10.452H17.6074C23.3241 10.4345 28.0002 5.73922 28.0002 0Z" fill="#43454C"/>
      <path d="M20.803 12.2296H10.3928C4.6761 12.2471 0 16.9424 0 22.6816H10.4102C16.1269 22.6642 20.803 17.9688 20.803 12.2296Z" fill="#43454C"/>
    </svg>
  </div>
</nav>

<div class="app-layout">
  <main class="main-panel">
    <div class="toolbar">
      <div class="toolbar-title">Project Planning</div>
    </div>

    <div class="filter-bar">
      <button class="today-btn" onclick="scrollToToday()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Today
      </button>
      <div style="width:1px;height:16px;background:var(--n-200);margin:0 6px;"></div>
      <button class="zoom-btn" onclick="setZoom('week')">Week</button>
      <button class="zoom-btn active" onclick="setZoom('month')">Month</button>
      <button class="zoom-btn" onclick="setZoom('quarter')">Quarter</button>
      <button class="zoom-btn" onclick="setZoom('year')">Year</button>
      <div style="width:1px;height:16px;background:var(--n-200);margin:0 6px;"></div>
      <button class="zoom-btn" onclick="expandAll()">Expand All</button>
      <button class="zoom-btn" onclick="collapseAll()">Collapse All</button>
      <div style="flex:1"></div>
      <button class="filter-btn" id="filterBtn" onclick="toggleFilterPopover(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filter
      </button>
      <button class="export-btn" id="exportBtn" onclick="toggleExportPopover(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div>

    <div class="export-popover" id="exportPopover">
      <div class="export-pop-item" onclick="exportPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

      </div>
      <div class="export-pop-item" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
        Export as CSV
      </div>
    </div>

    <div class="filter-popover" id="filterPopover">
      <div class="filter-pop-title">Projects</div>
    </div>

    <div id="task-view">
      <div id="colResizer" title="Drag to resize"></div>
      <div class="gantt-scroll" id="ganttScroll">
        <div class="gantt-table" id="ganttTable"></div>
      </div>
    </div>
  </main>
</div>

<div class="gantt-tip" id="tip"></div>

<script>
// ── TIMELINE CONFIG ───────────────────────────────────────────────
const TL_START = '2023-06-01';
const TL_END   = '2026-08-01';
let DAY_PX     = 3.0;

function toUTC(s) { const [y,m,d]=s.split('-').map(Number); return Date.UTC(y,m-1,d); }
function dayOffset(s) { return Math.round((toUTC(s)-toUTC(TL_START))/86400000); }
function px(s) { return dayOffset(s)*DAY_PX; }
function daysPx(n) { return n*DAY_PX; }
function fmtDate(s) { if(!s) return '—'; const [,m,d]=s.split('-').map(Number); return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}`; }

let TODAY_PX = 0;
const ZOOM_PRESETS = { week:14, month:4.5, quarter:2.0, year:0.75 };
let currentZoom = 'month';

function setZoom(preset) {
  currentZoom = preset;
  DAY_PX = ZOOM_PRESETS[preset];

const collapsed = new Set();

// ── FLATTEN ───────────────────────────────────────────────────────
function flatten(items, depth=0, hidden=false) {
  let out = [];
  for (const item of items) {
    out.push({ ...item, depth, hidden });
    if (item.ch && item.ch.length)
      out = out.concat(flatten(item.ch, depth+1, hidden||collapsed.has(item.id)));
  }
  return out;
}

// ── TIMELINE HEADER ───────────────────────────────────────────────
function buildHeader() {
  const MN_FULL =['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MN_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MN_ABBR =['J','F','M','A','M','J','J','A','S','O','N','D'];

  // collect all months in range
  const months=[];
  let [cy,cm]=TL_START.split('-').map(Number);
  const[ey,em]=TL_END.split('-').map(Number);
  while(cy<ey||(cy===ey&&cm<=em)){months.push({y:cy,m:cm});cm++;if(cm>12){cm=1;cy++;}}

  function monthWidth(i){
    const{y,m}=months[i];
    const s=`${y}-${String(m).padStart(2,'0')}-01`;
    const e=i<months.length-1?`${months[i+1].y}-${String(months[i+1].m).padStart(2,'0')}-01`:TL_END;
    return Math.max(0,px(e)-Math.max(0,px(s)));
  }

  const tl=document.createElement('div'); tl.className='thead-timeline';

  if(currentZoom==='week'){
    // top row: month+year; bottom row: day numbers
    const mr=document.createElement('div'); mr.className='months-row';
    for(let i=0;i<months.length;i++){
      const{y,m}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      const c=document.createElement('div'); c.className='month-cell'; c.style.width=w+'px';
      c.textContent=MN_SHORT[m-1]+' '+y; mr.appendChild(c);
    }
    const dr=document.createElement('div'); dr.className='weeks-row';
    let d=toUTC(TL_START); const end=toUTC(TL_END);
    while(d<=end){
      const dt=new Date(d); const day=dt.getUTCDate(); const dow=dt.getUTCDay();
      const c=document.createElement('div'); c.className='week-cell'; c.style.width=DAY_PX+'px';
      c.style.fontWeight=(dow===0||dow===6)?'600':'400';
      c.style.color=(dow===0||dow===6)?'var(--n-400)':'var(--n-500)';
      c.textContent=day===1||day===5||day===10||day===15||day===20||day===25?day:'';
      dr.appendChild(c); d+=86400000;
    }
    tl.appendChild(mr); tl.appendChild(dr);

  } else if(currentZoom==='month'){
    // top row: month+year; bottom row: week start dates
    const mr=document.createElement('div'); mr.className='months-row';
    for(let i=0;i<months.length;i++){
      const{y,m}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      const c=document.createElement('div'); c.className='month-cell'; c.style.width=w+'px';
      c.textContent=MN_SHORT[m-1]+' '+String(y).slice(2); mr.appendChild(c);
    }
    const wr=document.createElement('div'); wr.className='weeks-row';
    let wms=toUTC(TL_START); const tlems=toUTC(TL_END);
    const sd=new Date(wms); const dow=sd.getUTCDay(); if(dow!==0) wms-=dow*86400000;
    while(wms<=tlems){
      const d=new Date(wms);
      const c=document.createElement('div'); c.className='week-cell'; c.style.width=daysPx(7)+'px';
      c.textContent=d.getUTCDate(); wr.appendChild(c); wms+=7*86400000;
    }
    tl.appendChild(mr); tl.appendChild(wr);

  } else if(currentZoom==='quarter'){
    // top row: year bands; bottom row: month abbreviations
    const yr=document.createElement('div'); yr.className='months-row';
    // group months by year
    let prevY=null; let yStart=0; let yW=0;
    const flushYear=(y,w)=>{
      const c=document.createElement('div'); c.className='month-cell'; c.style.width=w+'px';
      c.style.fontWeight='600'; c.textContent=y; yr.appendChild(c);
    };
    for(let i=0;i<months.length;i++){
      const{y,m}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      if(y!==prevY){if(prevY!==null)flushYear(prevY,yW); prevY=y; yW=w;}
      else yW+=w;
    }
    if(prevY!==null) flushYear(prevY,yW);

    const mr=document.createElement('div'); mr.className='weeks-row';
    for(let i=0;i<months.length;i++){
      const{m}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      const c=document.createElement('div'); c.className='week-cell'; c.style.width=w+'px';
      c.textContent=MN_SHORT[m-1]; mr.appendChild(c);
    }
    tl.appendChild(yr); tl.appendChild(mr);

  } else { // year
    // top row: year bands; bottom row: 1-letter month initials
    const yr=document.createElement('div'); yr.className='months-row';
    let prevY=null; let yW=0;
    const flushYear=(y,w)=>{
      const c=document.createElement('div'); c.className='month-cell'; c.style.width=w+'px';
      c.style.fontWeight='600'; c.textContent=y; yr.appendChild(c);
    };
    for(let i=0;i<months.length;i++){
      const{y}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      if(y!==prevY){if(prevY!==null)flushYear(prevY,yW); prevY=y; yW=w;}
      else yW+=w;
    }
    if(prevY!==null) flushYear(prevY,yW);

    const mr=document.createElement('div'); mr.className='weeks-row';
    for(let i=0;i<months.length;i++){
      const{m}=months[i]; const w=monthWidth(i); if(w<=0)continue;
      const c=document.createElement('div'); c.className='week-cell'; c.style.width=w+'px';
      c.textContent=MN_ABBR[m-1]; mr.appendChild(c);
    }
    tl.appendChild(yr); tl.appendChild(mr);
  }

  return tl;
}

// ── MONTH/YEAR GRID POSITIONS ─────────────────────────────────────
function gridPositions() {
  const months=[]; const years=[];
  let [cy,cm]=TL_START.split('-').map(Number);
  cm++;if(cm>12){cm=1;cy++;}
  while(toUTC(`${cy}-${String(cm).padStart(2,'0')}-01`)<=toUTC(TL_END)){
    const mpx=px(`${cy}-${String(cm).padStart(2,'0')}-01`);
    months.push(mpx);
    if(cm===1) years.push(mpx);
    cm++;if(cm>12){cm=1;cy++;}
  }
  return {months, years};
}
let GRID = gridPositions();

// ── RENDER ROW ────────────────────────────────────────────────────
function renderRow(t) {
  const row = document.createElement('div'); row.className='g-row';
  if(t.type==='project') row.classList.add('is-project');
  else if(t.type==='phase') row.classList.add('is-phase');
  else if(t.type==='item') row.classList.add('is-item');

  // LEFT
  const left=document.createElement('div'); left.className='row-left';

  // stripe
  const p=palFor(t);
  const stripe=document.createElement('div'); stripe.className='phase-stripe';
  stripe.style.cssText=`background:${p.bar};width:${p.stripe||3}px`;
  left.appendChild(stripe);

  // name cell
  const nameCell=document.createElement('div'); nameCell.className='name-cell';
  const indentPx = t.type==='project' ? 8 : 6 + t.depth*16;
  nameCell.style.paddingLeft=indentPx+'px';

  const hasChildren=t.ch&&t.ch.length>0;
  if(hasChildren){
    const btn=document.createElement('button'); btn.className='collapse-btn';
    if(collapsed.has(t.id)) btn.classList.add('is-closed');
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
    btn.onclick=e=>{e.stopPropagation();collapsed.has(t.id)?collapsed.delete(t.id):collapsed.add(t.id);render();};
    nameCell.appendChild(btn);
  } else {
    const sp=document.createElement('div'); sp.className='name-spacer'; nameCell.appendChild(sp);
  }

  const nt=document.createElement('span'); nt.className='name-text'; nt.textContent=t.name; nameCell.appendChild(nt);
  if(t.type==='project'&&t.tag){
    const tag=document.createElement('span'); tag.className='project-tag'; tag.textContent=t.tag; nameCell.appendChild(tag);
  }

  const durCell=document.createElement('div'); durCell.className='meta-cell'; durCell.textContent=t.dur||'—';
  const startCell=document.createElement('div'); startCell.className='date-cell'; startCell.textContent=fmtDate(t.start);
  const endCell=document.createElement('div');   endCell.className='date-cell';   endCell.textContent=fmtDate(t.end);

  left.appendChild(nameCell); left.appendChild(durCell); left.appendChild(startCell); left.appendChild(endCell);

  // RIGHT
  const right=document.createElement('div'); right.className='row-right';
  GRID.months.forEach(mpx=>{const gl=document.createElement('div');gl.className='grid-line';gl.style.left=mpx+'px';right.appendChild(gl);});
  GRID.years.forEach(ypx=>{const yl=document.createElement('div');yl.className='year-line';yl.style.left=ypx+'px';right.appendChild(yl);});
  const tl=document.createElement('div');tl.className='today-line';tl.style.left=TODAY_PX+'px';right.appendChild(tl);

  if(t.start&&t.end){
    const startPx=px(t.start); const endPx=px(t.end);
    const barW=Math.max(endPx-startPx, t.type==='project'?DAY_PX*14:t.type==='phase'?DAY_PX*7:DAY_PX*3);
    const bar=document.createElement('div');
    const cls='g-bar '+(t.type==='project'?'bar-project':t.type==='phase'?'bar-phase':t.type==='item'?'bar-item':'bar-deliv')+' status-'+(t.status||'not-started');
    bar.className=cls;
    bar.style.cssText+=`left:${startPx}px;width:${barW}px;background:${barFill(t)};`;
    if(t.type==='deliverable') bar.style.border=`1px solid ${p.mid}`;
    if(barW>50){
      const lbl=document.createElement('span');lbl.className='bar-label';lbl.style.color=barText(t);lbl.textContent=t.name;bar.appendChild(lbl);
    }
    bar.addEventListener('mouseenter',e=>showTip(e,t));
    bar.addEventListener('mousemove',moveTip);
    bar.addEventListener('mouseleave',hideTip);
    right.appendChild(bar);
  }

  row.appendChild(left); row.appendChild(right); return row;
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  GRID = gridPositions();
  TODAY_PX = px('2026-07-08');
  const totalPx = px(TL_END) + 80;
  document.querySelector('.gantt-table').style.minWidth = `calc(var(--left-w) + ${totalPx}px)`;
  const table=document.getElementById('ganttTable'); table.innerHTML='';
  const thead=document.createElement('div'); thead.className='gantt-thead';
  const tl=document.createElement('div'); tl.className='thead-left';
  const tc=document.createElement('div'); tc.className='thead-cols';
  ['Name','Items','Start','End'].forEach(h=>{
    const el=document.createElement('div');el.className='thead-col';el.textContent=h;tc.appendChild(el);
  });
  tl.appendChild(tc); thead.appendChild(tl); thead.appendChild(buildHeader()); table.appendChild(thead);
  const rows=flatten(TASKS.filter(t => visibleProjects.has(t.id)));
  rows.forEach(t=>{if(!t.hidden)table.appendChild(renderRow(t));});
}

// ── COLUMN RESIZER ────────────────────────────────────────────────
function initResize(){
  const handle=document.getElementById('colResizer');
  if(!handle)return;
  handle.addEventListener('mousedown',function(e){
    e.preventDefault();
    const startX=e.clientX;
    const startW=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--left-w'))||380;
    handle.classList.add('dragging'); document.body.classList.add('col-resizing');
    function onMove(e){
      const nw=Math.max(200,Math.min(800,startW+(e.clientX-startX)));
      document.documentElement.style.setProperty('--left-w',nw+'px');
    }
    function onUp(){handle.classList.remove('dragging');document.body.classList.remove('col-resizing');window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
  });
}

  if (pop.classList.contains('open')) { pop.classList.remove('open'); return; }
  const r = btn.getBoundingClientRect();
  pop.style.top = (r.bottom + 6) + 'px';
  pop.style.right = (window.innerWidth - r.right) + 'px';
  pop.style.left = 'auto';
  pop.classList.add('open');
}

  TASKS.filter(t => visibleProjects.has(t.id)).forEach(proj => {
    proj.ch.forEach(r => {
      rows.push([proj.name, r.name, r.dur, r.start || '', r.end || '', r.status]);
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'project-planning.csv';
  a.click();
}

// ── PROJECT FILTER ────────────────────────────────────────────────
const visibleProjects = new Set(TASKS.map(t => t.id));

function buildFilterPopover() {
  const pop = document.getElementById('filterPopover');
  pop.innerHTML = '<div class="filter-pop-title">Projects</div>';
  TASKS.forEach(t => {
    const item = document.createElement('div');
    item.className = 'filter-pop-item';
    item.onclick = () => toggleProject(t.id);
    item.innerHTML = `
      <div class="filter-pop-check ${visibleProjects.has(t.id) ? 'checked' : ''}" id="chk-${t.id}"></div>
      <span class="filter-pop-label">${t.name}</span>`;
    pop.appendChild(item);
  });
  pop.innerHTML += '<div class="filter-pop-divider"></div><div class="filter-pop-clear" onclick="clearProjectFilter()">Show all projects</div>';
}

function toggleProject(id) {
  if (visibleProjects.has(id)) {
    if (visibleProjects.size > 1) visibleProjects.delete(id);
  } else {
    visibleProjects.add(id);
  }
  buildFilterPopover();
  updateFilterBtn();
  render();
}

function clearProjectFilter() {
  TASKS.forEach(t => visibleProjects.add(t.id));
  buildFilterPopover();
  updateFilterBtn();
  render();
}

function updateFilterBtn() {
  const btn = document.getElementById('filterBtn');
  btn.classList.toggle('has-filter', visibleProjects.size < TASKS.length);
}

function toggleFilterPopover(e) {
  e.stopPropagation();
  const pop = document.getElementById('filterPopover');
  const btn = document.getElementById('filterBtn');
  if (pop.classList.contains('open')) {
    pop.classList.remove('open'); return;
  }
  buildFilterPopover();
  const r = btn.getBoundingClientRect();
  pop.style.top = (r.bottom + 6) + 'px';
  pop.style.left = (r.left) + 'px';
  pop.classList.add('open');
}

document.addEventListener('click', () => document.getElementById('filterPopover').classList.remove('open'));

// ── INIT ──────────────────────────────────────────────────────────
render();
scrollToToday();
initResize();
</script>
</body>
